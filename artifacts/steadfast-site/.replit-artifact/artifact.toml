kind = "web"
previewPath = "/"
title = "Steadfast Accessibility"
version = "1.0.0"
id = "artifacts/steadfast-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21317

[services.development]
run = "pnpm --filter @workspace/steadfast-site run dev"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/steadfast-site", "run", "build"]

[services.production.run]
args = ["pnpm", "--filter", "@workspace/steadfast-site", "run", "serve"]

[services.env]
PORT = "21317"
BASE_PATH = "/"
